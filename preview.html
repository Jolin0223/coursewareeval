<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课件预览</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;font-family:'PingFang SC',sans-serif}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error{display:none;text-align:center;padding:40px}
  #error h2{color:#f87171;margin-bottom:12px}
  #preview-frame{flex:1;border:none;width:100%;display:none}
  .bar{height:36px;background:#1e293b;display:none;align-items:center;padding:0 16px;gap:10px;font-size:13px;border-bottom:1px solid #334155}
  .bar .t{color:#e2e8f0;font-weight:600}
  .bar .b{background:#334155;padding:2px 8px;border-radius:4px;font-size:11px;color:#94a3b8}
</style>
</head>
<body>
<div class="bar" id="bar"><span class="t" id="bt"></span><span class="b" id="bs"></span><span class="b" id="bc"></span></div>
<div id="loading"><div class="spinner"></div><div>加载课件中...</div></div>
<div id="error"><h2>⚠️ 加载失败</h2><p id="em"></p></div>
<iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
<script>
// 走 _worker.js 代理，不暴露真实 key
const DB_URL = window.location.origin + '/api/supabase';
const DB_KEY = 'dummy-key';

(async()=>{
  const id = new URLSearchParams(location.search).get('id');
  if (!id) return err('缺少参数 ?id=xxx');

  const db = supabase.createClient(DB_URL, DB_KEY);

  // 1) courseware.html_current
  const {data: cw, error: e1} = await db.from('courseware').select('title,source,composite_score,html_current,file_url').eq('id', id).single();
  if (e1 || !cw) return err('课件不存在: ' + id);
  let html = cw.html_current;

  // 2) fallback: evaluation_history.html_snapshot（最新轮次）
  if (!html || !html.trim()) {
    const {data: eh} = await db.from('evaluation_history').select('html_snapshot').eq('courseware_id', id).order('iteration_round', {ascending: false}).limit(1);
    if (eh && eh[0]) html = eh[0].html_snapshot;
  }

  // 3) fallback: file_url 直接 iframe
  if ((!html || !html.trim()) && cw.file_url) {
    bar(cw);
    const f = document.getElementById('preview-frame');
    f.src = cw.file_url;
    show(f);
    return;
  }

  if (!html || !html.trim()) return err('该课件暂无可预览内容');

  // base64 解码
  if (html.startsWith('data:text/html;base64,')) {
    try { html = atob(html.split(',')[1]); } catch(e) {}
  }

  bar(cw);
  const f = document.getElementById('preview-frame');
  f.src = URL.createObjectURL(new Blob([html], {type: 'text/html;charset=utf-8'}));
  show(f);
})();

function show(f) {
  f.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}
function bar(c) {
  const b = document.getElementById('bar');
  b.style.display = 'flex';
  document.getElementById('bt').textContent = c.title || '';
  const m = {self_skill:'自研', feixiang:'飞象', laoshibang:'老师帮'};
  document.getElementById('bs').textContent = m[c.source] || c.source || '';
  if (c.composite_score) document.getElementById('bc').textContent = '综合 ' + c.composite_score;
}
function err(m) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('em').textContent = m;
}
</script>
</body>
</html>
